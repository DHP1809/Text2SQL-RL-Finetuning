data:
  train_files: /workspace/dataset/train_dataset_rl_6000.json
  val_files: /workspace/dataset/train_dataset_rl_601.json
  prompt_key: input_seq
  answer_key: sql
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 16384
  max_response_length: 4096
  rollout_batch_size: 64    
  mini_rollout_batch_size: null
  val_batch_size: 64          
  format_prompt: /workspace/EasyR1/examples/format_prompt/text2sql.jinja
  override_chat_template: null
  shuffle: true
  seed: 1308
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 0.001
  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 32
    micro_batch_size_per_device_for_update: 8
    micro_batch_size_per_device_for_experience: 16
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 2
    model:
      model_path: /model
      enable_gradient_checkpointing: true
      trust_remote_code: true
      freeze_vision_tower: false
    
      lora:
        rank: 32
        alpha: 64
        target_modules: q_proj,k_proj,v_proj,o_proj

    optim:
      lr: 1.0e-6 #1.41e-5
      weight_decay: 1.0e-2
      strategy: adamw
      lr_warmup_ratio: 0.05
      lr_scheduler_type: cosine 
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: false
  
  critic:
    model:
      lora:
        rank: 32
        alpha: 64
        target_modules: q_proj,k_proj,v_proj,o_proj

  rollout:
    n: 8               
    temperature: 0.8            
    top_p: 0.95
    limit_images: 0
    gpu_memory_utilization: 0.70
    max_model_len: 20480
    max_num_batched_tokens: 65536
    enforce_eager: false
    enable_chunked_prefill: true
    tensor_parallel_size: 2
    disable_tqdm: false
    val_override_config:
      temperature: 0.6
      top_p: 0.95
      n: 2
    trust_remote_code: true

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_function: /workspace/EasyR1/examples/reward_function/text2sql.py:compute_score

trainer:
  total_epochs: 3
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen3_coder_30b_a3b_text2sql_grpo
  logger: ["file"]
  nnodes: 1
  n_gpus_per_node: 2
  max_try_make_batch: 20
  val_freq: 25
  val_before_train: false
  val_only: false
  val_generations_to_log: 5
  save_freq: 50
  save_limit: 2
  save_model_only: false
  save_checkpoint_path: /checkpoint
  load_checkpoint_path: null
  find_last_checkpoint: false