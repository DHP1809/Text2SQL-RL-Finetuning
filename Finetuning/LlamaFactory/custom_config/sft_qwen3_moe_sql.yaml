### model
model_name_or_path: /model #Qwen/Qwen3-coder-30B-A3B-instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128
lora_dropout: 0

### dataset
# Tên dataset đã được khai báo trong dataset_info.json
dataset_dir: /workspace/dataset
dataset: text2sql_custom 
eval_dataset: text2sql_eval 
template: qwen
cutoff_len: 8196
max_samples: 10000
packing: false
dataloader_num_workers: 16

### output
output_dir: /saves/qwen3-coder-30b-moe
logging_steps: 5
save_strategy: epoch
#save_steps: 500
plot_loss: false
overwrite_output_dir: true

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05                 
max_grad_norm: 1.0                 
weight_decay: 0.01            
optim: adamw_torch_fused
seed: 1308         
bf16: true
flash_attn: fa2
use_liger_kernel: true

val_size: 0.0                 
per_device_eval_batch_size: 4
eval_strategy: steps      
eval_steps: 5

### deepspeed (Khuyến nghị cho 2x H100)
deepspeed: /workspace/LlamaFactory/examples/deepspeed/ds_z3_offload_config.json